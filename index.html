<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ManRPG-Mobile-2D v0.1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app game-root">
    <section class="battle-wrap">
      <canvas id="gameCanvas" width="960" height="360" aria-label="battle canvas"></canvas>
      <section class="hud compact" id="hud"></section>
      <section class="phase-panel" id="phasePanel"></section>
      <section class="enemy-bar" id="enemyBar"></section>
      <button id="systemMenuToggle" class="system-menu-toggle" aria-label="system menu">☰</button>
      <section id="systemMenu" class="system-menu hidden"></section>
      <section id="quickSlotTray" class="quick-slot-tray"></section>
      <section id="skillMagicOverlay" class="skill-magic-overlay hidden"></section>
    </section>
  </main>

  <section class="controls" id="controls">
    <button data-action="left">←</button>
    <button data-action="right">→</button>
    <button data-action="jump">점프</button>
    <button data-action="dash">대시</button>
    <button data-action="attack">공격</button>
    <button data-action="skill">스킬</button>
    <button data-action="magic">마법</button>
  </section>

  <script src="game.js"></script>
</body>
</html>
